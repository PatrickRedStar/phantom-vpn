# PhantomVPN Server Configuration (QUIC Transport)
# Run `phantom-keygen` to generate keys and replace the placeholders below.

[network]
# QUIC listen address (port 443 = HTTPS/HTTP3, passes DPI)
listen_addr = "0.0.0.0:443"

# TUN interface name (use tun1 to avoid conflicts with WireGuard/wg0)
tun_name    = "tun1"

# Server-side IP inside the tunnel (clients get 10.7.0.2+)
tun_addr    = "10.7.0.1/24"

# TUN MTU — conservative for QUIC datagram limits
tun_mtu     = 1350

# WAN interface for NAT (comment out to disable NAT)
wan_iface   = "eth0"

[keys]
# Generated by `phantom-keygen` — replace with real values!
server_private_key = "REPLACE_ME_BASE64_SERVER_PRIVATE_KEY"
server_public_key  = "REPLACE_ME_BASE64_SERVER_PUBLIC_KEY"

[timeouts]
# Session idle timeout in seconds (default: 300s = 5 min)
idle_timeout_secs  = 300
# Maximum session lifetime (default: 86400s = 24h)
hard_timeout_secs  = 86400

[quic]
# TLS certificate for QUIC. Options:
# 1. Self-signed (default) — set cert_subjects to your domain/IP
# 2. Let's Encrypt — set cert_path and key_path

# For self-signed mode:
cert_subjects = ["myserver.com"]

# For Let's Encrypt / real certificates:
# cert_path = "/etc/letsencrypt/live/myserver.com/fullchain.pem"
# key_path  = "/etc/letsencrypt/live/myserver.com/privkey.pem"

# QUIC idle timeout (seconds)
idle_timeout_secs = 30
