name: Build OpenWrt Client

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:

# ─────────────────────────────────────────────────────────────────────────────
  build-openwrt:
    name: OpenWrt client (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: mipsel-unknown-linux-musl
            name: ghoststream-mipsel
            toolchain: nightly
            build_std: true
            use_zigbuild: false
          - target: aarch64-unknown-linux-musl
            name: ghoststream-aarch64
            toolchain: stable
            build_std: false
            use_zigbuild: true
          - target: armv7-unknown-linux-musleabihf
            name: ghoststream-armv7
            toolchain: stable
            build_std: false
            use_zigbuild: true
          - target: x86_64-unknown-linux-musl
            name: ghoststream-x86_64
            toolchain: stable
            build_std: false
            use_zigbuild: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          targets: ${{ !matrix.build_std && matrix.target || '' }}
          components: ${{ matrix.build_std && 'rust-src' || '' }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: openwrt-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: openwrt-${{ matrix.target }}-cargo-

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        run: pip3 install ziglang && cargo install cargo-zigbuild

      - name: Install cross
        if: ${{ !matrix.use_zigbuild }}
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build with zigbuild
        if: matrix.use_zigbuild
        run: cargo zigbuild --release --target ${{ matrix.target }} -p phantom-client-openwrt

      - name: Build with cross (mipsel)
        if: ${{ !matrix.use_zigbuild }}
        env:
          CROSS_CONTAINER_ENGINE: docker
        run: |
          cross build --release --target ${{ matrix.target }} -p phantom-client-openwrt \
            -Z build-std=std,panic_abort

      - name: Check size
        run: ls -lh target/${{ matrix.target }}/release/ghoststream

      - name: Rename artifact
        run: cp target/${{ matrix.target }}/release/ghoststream ${{ matrix.name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

# ─────────────────────────────────────────────────────────────────────────────
  release-openwrt:
    name: Attach OpenWrt binaries to Release
    needs: build-openwrt
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          for dir in artifacts/ghoststream-*; do
            name=$(basename "$dir")
            cp "$dir/$name" "release-files/$name"
            chmod +x "release-files/$name"
          done
          cp openwrt/proto/ghoststream.sh release-files/
          cp openwrt/luci/htdocs/luci-static/resources/protocol/ghoststream.js release-files/
          cp openwrt/luci/root/usr/share/rpcd/acl.d/luci-proto-ghoststream.json release-files/
          cp ghoststream-install.sh release-files/

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          append_body: true
          body: |
            ## OpenWrt Client
            Install: `wget -O /tmp/gs-install.sh https://github.com/${{ github.repository }}/releases/latest/download/ghoststream-install.sh && sh /tmp/gs-install.sh`
