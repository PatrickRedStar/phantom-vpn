name: Windows CI

on:
  push:
    branches:
      - master
      - feature/windows-client
  pull_request:
    paths:
      - 'apps/windows/**'
      - 'crates/client-windows-core/**'
      - 'crates/client-core-runtime/**'
      - 'crates/client-common/**'
      - 'crates/core/**'
      - 'crates/gui-ipc/**'
      - '.github/workflows/windows-ci.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'

env:
  CARGO_TERM_COLOR: always
  WINTUN_VERSION: "0.14.1"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Headless tests (cross-platform)
        run: cargo test -p client-windows-core --no-fail-fast

      - name: Build release binary
        run: cargo build --release -p ghoststream-windows

      - name: Download and verify wintun.dll
        shell: pwsh
        env:
          WINTUN_SHA256: 07c256185d6ee3652e09fa55c0b673e2624b565e02c4b9091c79ca7d2f24ef51
        run: |
          $ErrorActionPreference = 'Stop'

          $url = "https://www.wintun.net/builds/wintun-$env:WINTUN_VERSION.zip"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile wintun.zip -UseBasicParsing -MaximumRetryCount 3

          if (-not (Test-Path wintun.zip)) {
              throw "wintun.zip was not created — download silently failed"
          }

          $actualHash = (Get-FileHash wintun.zip -Algorithm SHA256).Hash.ToLower()
          $expectedHash = $env:WINTUN_SHA256.ToLower()
          if ($actualHash -ne $expectedHash) {
              throw "wintun-$env:WINTUN_VERSION.zip SHA256 mismatch: expected $expectedHash, got $actualHash"
          }
          Write-Host "SHA256 verified: $actualHash"

          Expand-Archive wintun.zip -DestinationPath wintun-extracted -Force

          $dllPath = "wintun-extracted/wintun/bin/amd64/wintun.dll"
          if (-not (Test-Path $dllPath)) {
              # Try a defensive search in case the archive layout changes upstream.
              $found = Get-ChildItem -Path wintun-extracted -Recurse -Filter wintun.dll |
                       Where-Object { $_.FullName -like "*amd64*" } |
                       Select-Object -First 1
              if ($null -eq $found) {
                  throw "wintun.dll (amd64) not found inside the ZIP — upstream layout changed?"
              }
              $dllPath = $found.FullName
              Write-Host "Found wintun.dll at non-standard path: $dllPath"
          }

          Copy-Item $dllPath -Destination wintun.dll
          Write-Host "wintun.dll ready"

      - name: Assemble distributable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/ghoststream-windows.exe -Destination dist/ghoststream.exe
          Copy-Item wintun.dll -Destination dist/wintun.dll
          Compress-Archive -Path dist/* -DestinationPath GhostStream-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: GhostStream-Windows
          path: GhostStream-Windows.zip
          if-no-files-found: error
          retention-days: 30
