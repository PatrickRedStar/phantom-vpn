name: Build & Release

# Trigger: push a version tag (v1.0, v1.2.3, etc.)
# Or run manually via Actions → Run workflow
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed to create GitHub Release

jobs:

# ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux client (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Build Linux client
        run: cargo build --release -p phantom-client-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: phantom-client-linux
          path: target/release/phantom-client-linux

# ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS GUI App (.dmg)
    runs-on: macos-14   # arm64 runner (Apple Silicon)
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable (arm64 + x86_64 targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build phantom-client-macos (arm64)
        run: cargo build --release -p phantom-client-macos --target aarch64-apple-darwin

      - name: Build phantom-client-macos (x86_64)
        run: cargo build --release -p phantom-client-macos --target x86_64-apple-darwin

      - name: Create universal binary (arm64 + x86_64)
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/phantom-client-macos \
            target/x86_64-apple-darwin/release/phantom-client-macos \
            -output phantom-client-macos-universal
          lipo -info phantom-client-macos-universal

      - name: Build SwiftUI app
        working-directory: phantom-vpn-macos
        run: swift build -c release

      - name: Create .app bundle
        working-directory: phantom-vpn-macos
        run: bash build.sh

      - name: Bundle Rust binary into .app
        run: |
          cp phantom-client-macos-universal \
            phantom-vpn-macos/PhantomVPN.app/Contents/MacOS/phantom-client-macos
          chmod +x phantom-vpn-macos/PhantomVPN.app/Contents/MacOS/phantom-client-macos

      - name: Package as DMG (drag-to-Applications)
        run: |
          mkdir dmg-staging
          cp -r phantom-vpn-macos/PhantomVPN.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create \
            -volname "PhantomVPN" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            PhantomVPN-macOS.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhantomVPN-macOS
          path: PhantomVPN-macOS.dmg

# ─────────────────────────────────────────────────────────────────────────────
  build-ios:
    name: iOS app (.ipa)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable (iOS targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ios-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ios-cargo-

      - name: Build Rust staticlib for iOS
        run: bash scripts/build-ios-rust.sh

      - name: Build iOS artifact (signed IPA or unsigned app)
        run: |
          mkdir -p "$PWD/build/ios-export"

          if [ -n "${{ secrets.IOS_DEVELOPMENT_TEAM }}" ]; then
            xcodebuild \
              -project phantom-vpn-ios/PhantomVPN.xcodeproj \
              -scheme PhantomVPN \
              -configuration Release \
              -destination generic/platform=iOS \
              -archivePath "$PWD/build/PhantomVPN.xcarchive" \
              DEVELOPMENT_TEAM="${{ secrets.IOS_DEVELOPMENT_TEAM }}" \
              archive

            cat > "$PWD/build/ExportOptions.plist" <<'EOF'
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
                <key>method</key>
                <string>app-store</string>
                <key>signingStyle</key>
                <string>automatic</string>
                <key>stripSwiftSymbols</key>
                <true/>
                <key>uploadSymbols</key>
                <true/>
            </dict>
            </plist>
            EOF

            xcodebuild -exportArchive \
              -archivePath "$PWD/build/PhantomVPN.xcarchive" \
              -exportOptionsPlist "$PWD/build/ExportOptions.plist" \
              -exportPath "$PWD/build/ios-export"
          else
            xcodebuild \
              -project phantom-vpn-ios/PhantomVPN.xcodeproj \
              -scheme PhantomVPN \
              -configuration Release \
              -sdk iphonesimulator \
              -destination "platform=iOS Simulator,name=iPhone 15" \
              CODE_SIGNING_ALLOWED=NO \
              build

            APP_PATH="$(find "$PWD" -type d -name 'PhantomVPN.app' | head -n 1)"
            if [ -z "$APP_PATH" ]; then
              echo "PhantomVPN.app not found after simulator build"
              exit 1
            fi
            cp -R "$APP_PATH" "$PWD/build/ios-export/PhantomVPN.app"
            cd "$PWD/build/ios-export"
            zip -r PhantomVPN-unsigned-ios.zip PhantomVPN.app
          fi

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhantomVPN-iOS
          path: |
            build/ios-export/*.ipa
            build/ios-export/*unsigned-ios.zip

# ─────────────────────────────────────────────────────────────────────────────
  build-android:
    name: Android client (.apk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + Android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: android-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: android-cargo-

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Rust .so for arm64-v8a
        run: |
          # ANDROID_NDK_ROOT is a shell env var set by the runner, not a GH Actions context var
          export ANDROID_NDK_HOME="$ANDROID_NDK_ROOT"
          cargo ndk -t arm64-v8a --platform 26 \
            build --release -p phantom-client-android

          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          cp target/aarch64-linux-android/release/libphantom_android.so \
            android/app/src/main/jniLibs/arm64-v8a/

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Generate Gradle wrapper
        run: cd android && gradle wrapper --gradle-version 8.7

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhantomVPN-Android
          path: android/app/build/outputs/apk/debug/app-debug.apk

# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos, build-android, build-ios]
    runs-on: ubuntu-latest
    # Only create release when triggered by a version tag
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PhantomVPN ${{ github.ref_name }}"
          body: |
            ## PhantomVPN ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | macOS (Universal) | `PhantomVPN-macOS.dmg` | Menu bar app, macOS 13+ |
            | Linux x86_64 | `phantom-client-linux` | CLI |
            | Android (arm64) | `app-debug.apk` | |
            | iOS | `PhantomVPN.ipa` / `PhantomVPN-unsigned-ios.zip` | IPA при наличии signing, иначе unsigned sim build |

            ### macOS install
            1. Скачай `PhantomVPN-macOS.dmg`
            2. Открой DMG, перетащи `PhantomVPN.app` в `/Applications`
            3. Сними карантин (приложение не подписано):
            ```bash
            xattr -dr com.apple.quarantine /Applications/PhantomVPN.app
            ```
            4. Запусти — иконка щита появится в menu bar
            5. Вкладка **Профили** → вставь строку подключения (QR из Admin Panel)

            ### Android install
            ```
            adb install app-debug.apk
            ```

            ### Config
            See [config examples](config/) in the repository.
          files: |
            artifacts/phantom-client-linux/phantom-client-linux
            artifacts/PhantomVPN-macOS/PhantomVPN-macOS.dmg
            artifacts/PhantomVPN-Android/app-debug.apk
            artifacts/PhantomVPN-iOS/*.ipa
            artifacts/PhantomVPN-iOS/*unsigned-ios.zip
          draft: false
          prerelease: false
