name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:

# ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux client (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Build Linux client
        run: cargo build --release -p phantom-client-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: phantom-client-linux
          path: target/release/phantom-client-linux

# ─────────────────────────────────────────────────────────────────────────────
  build-server:
    name: Server + keygen (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: server-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: server-cargo-

      - name: Build phantom-server + phantom-keygen
        run: cargo build --release -p phantom-server

      - name: Upload phantom-server
        uses: actions/upload-artifact@v4
        with:
          name: phantom-server
          path: target/release/phantom-server

      - name: Upload phantom-keygen
        uses: actions/upload-artifact@v4
        with:
          name: phantom-keygen
          path: target/release/phantom-keygen

# ─────────────────────────────────────────────────────────────────────────────
  build-android:
    name: Android client (.apk + .aab)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + Android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: android-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: android-cargo-

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Rust .so for arm64-v8a
        run: |
          export ANDROID_NDK_HOME="$ANDROID_NDK_ROOT"
          cargo ndk -t arm64-v8a --platform 26 \
            build --release -p phantom-client-android

          mkdir -p apps/android/app/src/main/jniLibs/arm64-v8a
          cp target/aarch64-linux-android/release/libphantom_android.so \
            apps/android/app/src/main/jniLibs/arm64-v8a/

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > /tmp/ghoststream-release.jks

      - name: Build signed release APK + AAB
        env:
          RELEASE_KEYSTORE_PATH: /tmp/ghoststream-release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        run: cd apps/android && ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhantomVPN-Android
          path: apps/android/app/build/outputs/apk/release/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: PhantomVPN-Android-AAB
          path: apps/android/app/build/outputs/bundle/release/app-release.aab

# ─────────────────────────────────────────────────────────────────────────────
  build-linux-gui:
    name: Linux GUI client (x86_64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fontconfig libfontconfig-dev \
            libxkbcommon-dev libwayland-dev \
            libxcb1-dev libxkbcommon-x11-dev \
            libssl-dev pkg-config libdbus-1-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-gui

      - name: Build GUI + helper
        run: cargo build --release -p ghoststream-gui -p ghoststream-helper

      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/release/ghoststream-gui    dist/
          cp target/release/ghoststream-helper dist/
          cp -r apps/linux/gui/packaging       dist/packaging
          cp apps/linux/gui/assets/icons/ghoststream.png dist/ 2>/dev/null || true
          cd dist && tar czf ../ghoststream-linux-gui-x86_64.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghoststream-linux-gui-x86_64
          path: ghoststream-linux-gui-x86_64.tar.gz

# ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS app (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Print toolchain versions
        run: |
          sw_vers
          xcodebuild -version
          rustc --version || true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-release

      - name: Install packaging tools
        run: |
          brew install xcodegen create-dmg
          if ! command -v cbindgen >/dev/null 2>&1; then
            cargo install cbindgen --locked
          fi

      - name: Validate macOS release secrets
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          MACOS_APP_PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_APP_PROVISIONING_PROFILE_BASE64 }}
          MACOS_TUNNEL_PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_TUNNEL_PROVISIONING_PROFILE_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          missing=()
          [[ -n "$MACOS_CERTIFICATE_P12_BASE64" ]] || missing+=("MACOS_CERTIFICATE_P12_BASE64")
          [[ -n "$MACOS_CERTIFICATE_PASSWORD" ]] || missing+=("MACOS_CERTIFICATE_PASSWORD")
          [[ -n "$MACOS_DEVELOPER_ID_CERTIFICATE_BASE64" ]] || missing+=("MACOS_DEVELOPER_ID_CERTIFICATE_BASE64")

          has_api_key=0
          if [[ -n "$APP_STORE_CONNECT_API_KEY_BASE64" || -n "$APP_STORE_CONNECT_KEY_ID" || -n "$APP_STORE_CONNECT_ISSUER_ID" ]]; then
            [[ -n "$APP_STORE_CONNECT_API_KEY_BASE64" ]] || missing+=("APP_STORE_CONNECT_API_KEY_BASE64")
            [[ -n "$APP_STORE_CONNECT_KEY_ID" ]] || missing+=("APP_STORE_CONNECT_KEY_ID")
            [[ -n "$APP_STORE_CONNECT_ISSUER_ID" ]] || missing+=("APP_STORE_CONNECT_ISSUER_ID")
            has_api_key=1
          fi

          has_apple_id=0
          if [[ -n "$APPLE_ID" || -n "$APPLE_APP_SPECIFIC_PASSWORD" ]]; then
            [[ -n "$APPLE_ID" ]] || missing+=("APPLE_ID")
            [[ -n "$APPLE_APP_SPECIFIC_PASSWORD" ]] || missing+=("APPLE_APP_SPECIFIC_PASSWORD")
            has_apple_id=1
          fi

          if [[ "$has_api_key" == "0" && "$has_apple_id" == "0" ]]; then
            missing+=("APP_STORE_CONNECT_API_KEY_BASE64/APP_STORE_CONNECT_KEY_ID/APP_STORE_CONNECT_ISSUER_ID or APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD")
          fi

          [[ -n "$MACOS_APP_PROVISIONING_PROFILE_BASE64" ]] || missing+=("MACOS_APP_PROVISIONING_PROFILE_BASE64")
          [[ -n "$MACOS_TUNNEL_PROVISIONING_PROFILE_BASE64" ]] || missing+=("MACOS_TUNNEL_PROVISIONING_PROFILE_BASE64")

          if [[ ${#missing[@]} -gt 0 ]]; then
            printf 'Missing macOS release secret: %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/ghoststream-release.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/ghoststream-developer-id.p12"
          DEVELOPER_ID_CERT_PATH="$RUNNER_TEMP/ghoststream-developer-id.cer"

          DATA="$MACOS_CERTIFICATE_P12_BASE64" OUT="$CERT_PATH" python3 - <<'PY'
          import base64
          import os
          from pathlib import Path
          Path(os.environ["OUT"]).write_bytes(base64.b64decode(os.environ["DATA"]))
          PY
          DATA="$MACOS_DEVELOPER_ID_CERTIFICATE_BASE64" OUT="$DEVELOPER_ID_CERT_PATH" python3 - <<'PY'
          import base64
          import os
          from pathlib import Path
          Path(os.environ["OUT"]).write_bytes(base64.b64decode(os.environ["DATA"]))
          PY

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security import "$DEVELOPER_ID_CERT_PATH" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productsign
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          DEVELOPER_ID_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F '"' '/Developer ID Application/ { print $2; exit }')"
          if [[ -z "$DEVELOPER_ID_IDENTITY" ]]; then
            echo "No valid Developer ID Application identity found after importing certificate and private key." >&2
            exit 1
          fi
          {
            echo "GHOSTSTREAM_EXPORT_SIGNING_CERTIFICATE=$DEVELOPER_ID_IDENTITY"
            echo "GHOSTSTREAM_CODE_SIGN_IDENTITY=$DEVELOPER_ID_IDENTITY"
          } >> "$GITHUB_ENV"

      - name: Install provisioning profiles
        env:
          GHOSTSTREAM_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID || 'UPG896A272' }}
          MACOS_APP_PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_APP_PROVISIONING_PROFILE_BASE64 }}
          MACOS_TUNNEL_PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_TUNNEL_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"

          install_profile() {
            local data="$1"
            local name="$2"
            local bundle_id="$3"
            local env_name="$4"
            [[ -n "$data" ]] || return 0
            local raw="$RUNNER_TEMP/$name.provisionprofile"
            local plist="$RUNNER_TEMP/$name.plist"
            DATA="$data" OUT="$raw" python3 - <<'PY'
          import base64
          import os
          from pathlib import Path
          Path(os.environ["OUT"]).write_bytes(base64.b64decode(os.environ["DATA"]))
          PY
            security cms -D -i "$raw" > "$plist"
            local uuid
            local profile_name
            local app_identifier
            uuid="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$plist")"
            profile_name="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$plist")"
            app_identifier="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.application-identifier' "$plist")"
            if [[ "$app_identifier" != "$GHOSTSTREAM_DEVELOPMENT_TEAM.$bundle_id" ]]; then
              echo "Provisioning profile $name has App ID '$app_identifier', expected '$GHOSTSTREAM_DEVELOPMENT_TEAM.$bundle_id'." >&2
              exit 1
            fi
            cp "$raw" "$HOME/Library/MobileDevice/Provisioning Profiles/$uuid.provisionprofile"
            echo "$env_name=$profile_name" >> "$GITHUB_ENV"
            echo "Installed provisioning profile $name: $profile_name ($uuid)"
          }

          install_profile "$MACOS_APP_PROVISIONING_PROFILE_BASE64" app com.ghoststream.vpn GHOSTSTREAM_APP_PROVISIONING_PROFILE_SPECIFIER
          install_profile "$MACOS_TUNNEL_PROVISIONING_PROFILE_BASE64" tunnel com.ghoststream.vpn.tunnel GHOSTSTREAM_TUNNEL_PROVISIONING_PROFILE_SPECIFIER

      - name: Prepare App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          if [[ -z "$APP_STORE_CONNECT_API_KEY_BASE64" ]]; then
            echo "No App Store Connect API key configured; using installed provisioning profiles and Apple ID notarization."
            exit 0
          fi

          KEY_PATH="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          DATA="$APP_STORE_CONNECT_API_KEY_BASE64" OUT="$KEY_PATH" python3 - <<'PY'
          import base64
          import os
          from pathlib import Path
          Path(os.environ["OUT"]).write_bytes(base64.b64decode(os.environ["DATA"]))
          PY
          {
            echo "GHOSTSTREAM_ASC_KEY_PATH=$KEY_PATH"
            echo "GHOSTSTREAM_ASC_KEY_ID=$APP_STORE_CONNECT_KEY_ID"
            echo "GHOSTSTREAM_ASC_ISSUER_ID=$APP_STORE_CONNECT_ISSUER_ID"
            echo "GHOSTSTREAM_ALLOW_PROVISIONING=1"
          } >> "$GITHUB_ENV"

      - name: Build PhantomCore XCFramework
        run: ./crates/client-apple/build-xcframework.sh

      - name: Archive and export Developer ID app
        env:
          GHOSTSTREAM_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID || 'UPG896A272' }}
          GHOSTSTREAM_EXPORT_SIGNING_STYLE: manual
        run: cd apps/macos && ./scripts/build-release.sh

      - name: Notarize exported app
        env:
          GHOSTSTREAM_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID || 'UPG896A272' }}
          GHOSTSTREAM_NOTARY_APPLE_ID: ${{ secrets.APPLE_ID }}
          GHOSTSTREAM_NOTARY_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          GHOSTSTREAM_NOTARY_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || 'UPG896A272' }}
        run: cd apps/macos && ./scripts/notarize.sh build/Release/export/GhostStream.app

      - name: Package DMG
        env:
          GHOSTSTREAM_SIGN_DMG: "1"
        run: cd apps/macos && ./scripts/package-dmg.sh build/Release/export/GhostStream.app

      - name: Notarize DMG
        env:
          GHOSTSTREAM_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID || 'UPG896A272' }}
          GHOSTSTREAM_NOTARY_APPLE_ID: ${{ secrets.APPLE_ID }}
          GHOSTSTREAM_NOTARY_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          GHOSTSTREAM_NOTARY_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || 'UPG896A272' }}
        run: |
          DMG_PATH="$(find apps/macos/build/Release/dist -maxdepth 1 -name 'GhostStream-*-macOS.dmg' -print -quit)"
          cd apps/macos && ./scripts/notarize.sh "$GITHUB_WORKSPACE/$DMG_PATH"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: GhostStream-macOS-DMG
          path: apps/macos/build/Release/dist/*.dmg

# ─────────────────────────────────────────────────────────────────────────────
  build-openwrt:
    name: OpenWrt client (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: mipsel-unknown-linux-musl
            name: openwrt-mipsel
            toolchain: nightly
            build_std: true
            use_zigbuild: false
          - target: aarch64-unknown-linux-musl
            name: openwrt-aarch64
            toolchain: stable
            build_std: false
            use_zigbuild: true
          - target: armv7-unknown-linux-musleabihf
            name: openwrt-armv7
            toolchain: stable
            build_std: false
            use_zigbuild: true
          - target: x86_64-unknown-linux-musl
            name: openwrt-x86_64
            toolchain: stable
            build_std: false
            use_zigbuild: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          targets: ${{ !matrix.build_std && matrix.target || '' }}
          components: ${{ matrix.build_std && 'rust-src' || '' }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: openwrt-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: openwrt-${{ matrix.target }}-cargo-

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        run: pip3 install ziglang && cargo install cargo-zigbuild

      - name: Install cross
        if: ${{ !matrix.use_zigbuild }}
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build with zigbuild
        if: matrix.use_zigbuild
        run: cargo zigbuild --release --target ${{ matrix.target }} -p phantom-client-openwrt

      - name: Build with cross (mipsel)
        if: ${{ !matrix.use_zigbuild }}
        env:
          CROSS_CONTAINER_ENGINE: docker
        run: |
          cross build --release --target ${{ matrix.target }} -p phantom-client-openwrt \
            -Z build-std=std,panic_abort

      - name: Rename artifact
        run: cp target/${{ matrix.target }}/release/ghoststream ${{ matrix.name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-linux, build-server, build-android, build-linux-gui, build-macos, build-openwrt]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PhantomVPN ${{ github.ref_name }}"
          body: |
            ## PhantomVPN ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Linux client x86_64 | `phantom-client-linux` |
            | Server x86_64 | `phantom-server` |
            | Keygen x86_64 | `phantom-keygen` |
            | Android (arm64) | `app-release.apk` |
            | Linux GUI x86_64 | `ghoststream-linux-gui-x86_64.tar.gz` |
            | macOS | `GhostStream-*-macOS.dmg` |
            | OpenWrt aarch64 | `openwrt-aarch64` |
            | OpenWrt armv7 | `openwrt-armv7` |
            | OpenWrt x86_64 | `openwrt-x86_64` |
            | OpenWrt mipsel | `openwrt-mipsel` |

            ### OpenWrt install
            ```sh
            wget -O /tmp/ghoststream https://github.com/${{ github.repository }}/releases/latest/download/openwrt-$(uname -m | sed 's/x86_64/x86_64/;s/aarch64/aarch64/;s/armv7l/armv7/')
            chmod +x /tmp/ghoststream && /tmp/ghoststream
            ```

            ### Android install
            ```sh
            adb install app-release.apk
            ```
          files: |
            artifacts/phantom-client-linux/phantom-client-linux
            artifacts/phantom-server/phantom-server
            artifacts/phantom-keygen/phantom-keygen
            artifacts/PhantomVPN-Android/app-release.apk
            artifacts/ghoststream-linux-gui-x86_64/ghoststream-linux-gui-x86_64.tar.gz
            artifacts/GhostStream-macOS-DMG/*.dmg
            artifacts/openwrt-aarch64/openwrt-aarch64
            artifacts/openwrt-armv7/openwrt-armv7
            artifacts/openwrt-x86_64/openwrt-x86_64
            artifacts/openwrt-mipsel/openwrt-mipsel
          draft: false
          prerelease: false
