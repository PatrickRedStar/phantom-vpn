name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:

# ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux client (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Build Linux client
        run: cargo build --release -p phantom-client-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: phantom-client-linux
          path: target/release/phantom-client-linux

# ─────────────────────────────────────────────────────────────────────────────
  build-server:
    name: Server + keygen (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: server-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: server-cargo-

      - name: Build phantom-server + phantom-keygen
        run: cargo build --release -p phantom-server

      - name: Upload phantom-server
        uses: actions/upload-artifact@v4
        with:
          name: phantom-server
          path: target/release/phantom-server

      - name: Upload phantom-keygen
        uses: actions/upload-artifact@v4
        with:
          name: phantom-keygen
          path: target/release/phantom-keygen

# ─────────────────────────────────────────────────────────────────────────────
  build-android:
    name: Android client (.apk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + Android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: android-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: android-cargo-

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Rust .so for arm64-v8a
        run: |
          export ANDROID_NDK_HOME="$ANDROID_NDK_ROOT"
          cargo ndk -t arm64-v8a --platform 26 \
            build --release -p phantom-client-android

          mkdir -p apps/android/app/src/main/jniLibs/arm64-v8a
          cp target/aarch64-linux-android/release/libphantom_android.so \
            apps/android/app/src/main/jniLibs/arm64-v8a/

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: cd apps/android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhantomVPN-Android
          path: apps/android/app/build/outputs/apk/debug/app-debug.apk

# ─────────────────────────────────────────────────────────────────────────────
  build-linux-gui:
    name: Linux GUI client (x86_64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fontconfig libfontconfig-dev \
            libxkbcommon-dev libwayland-dev \
            libxcb1-dev libxkbcommon-x11-dev \
            libssl-dev pkg-config libdbus-1-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-gui

      - name: Build GUI + helper
        run: cargo build --release -p ghoststream-gui -p ghoststream-helper

      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/release/ghoststream-gui    dist/
          cp target/release/ghoststream-helper dist/
          cp -r apps/linux/gui/packaging       dist/packaging
          cp apps/linux/gui/assets/icons/ghoststream.png dist/ 2>/dev/null || true
          cd dist && tar czf ../ghoststream-linux-gui-x86_64.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghoststream-linux-gui-x86_64
          path: ghoststream-linux-gui-x86_64.tar.gz

# ─────────────────────────────────────────────────────────────────────────────
  build-openwrt:
    name: OpenWrt client (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: mipsel-unknown-linux-musl
            name: openwrt-mipsel
            toolchain: nightly
            build_std: true
            use_zigbuild: false
          - target: aarch64-unknown-linux-musl
            name: openwrt-aarch64
            toolchain: stable
            build_std: false
            use_zigbuild: true
          - target: armv7-unknown-linux-musleabihf
            name: openwrt-armv7
            toolchain: stable
            build_std: false
            use_zigbuild: true
          - target: x86_64-unknown-linux-musl
            name: openwrt-x86_64
            toolchain: stable
            build_std: false
            use_zigbuild: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          targets: ${{ !matrix.build_std && matrix.target || '' }}
          components: ${{ matrix.build_std && 'rust-src' || '' }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: openwrt-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: openwrt-${{ matrix.target }}-cargo-

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        run: pip3 install ziglang && cargo install cargo-zigbuild

      - name: Install cross
        if: ${{ !matrix.use_zigbuild }}
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build with zigbuild
        if: matrix.use_zigbuild
        run: cargo zigbuild --release --target ${{ matrix.target }} -p phantom-client-openwrt

      - name: Build with cross (mipsel)
        if: ${{ !matrix.use_zigbuild }}
        env:
          CROSS_CONTAINER_ENGINE: docker
        run: |
          cross build --release --target ${{ matrix.target }} -p phantom-client-openwrt \
            -Z build-std=std,panic_abort

      - name: Rename artifact
        run: cp target/${{ matrix.target }}/release/ghoststream ${{ matrix.name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-linux, build-server, build-android, build-linux-gui, build-openwrt]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PhantomVPN ${{ github.ref_name }}"
          body: |
            ## PhantomVPN ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Linux client x86_64 | `phantom-client-linux` |
            | Server x86_64 | `phantom-server` |
            | Keygen x86_64 | `phantom-keygen` |
            | Android (arm64) | `app-debug.apk` |
            | Linux GUI x86_64 | `ghoststream-linux-gui-x86_64.tar.gz` |
            | OpenWrt aarch64 | `openwrt-aarch64` |
            | OpenWrt armv7 | `openwrt-armv7` |
            | OpenWrt x86_64 | `openwrt-x86_64` |
            | OpenWrt mipsel | `openwrt-mipsel` |

            ### OpenWrt install
            ```sh
            wget -O /tmp/ghoststream https://github.com/${{ github.repository }}/releases/latest/download/openwrt-$(uname -m | sed 's/x86_64/x86_64/;s/aarch64/aarch64/;s/armv7l/armv7/')
            chmod +x /tmp/ghoststream && /tmp/ghoststream
            ```

            ### Android install
            ```sh
            adb install app-debug.apk
            ```
          files: |
            artifacts/phantom-client-linux/phantom-client-linux
            artifacts/phantom-server/phantom-server
            artifacts/phantom-keygen/phantom-keygen
            artifacts/PhantomVPN-Android/app-debug.apk
            artifacts/ghoststream-linux-gui-x86_64/ghoststream-linux-gui-x86_64.tar.gz
            artifacts/openwrt-aarch64/openwrt-aarch64
            artifacts/openwrt-armv7/openwrt-armv7
            artifacts/openwrt-x86_64/openwrt-x86_64
            artifacts/openwrt-mipsel/openwrt-mipsel
          draft: false
          prerelease: false
