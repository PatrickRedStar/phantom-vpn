name: Build & Release

# Trigger: push a version tag (v1.0, v1.2.3, etc.)
# Or run manually via Actions → Run workflow
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write   # needed to create GitHub Release

jobs:

# ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux client (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Build Linux client
        run: cargo build --release -p phantom-client-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: phantom-client-linux
          path: target/release/phantom-client-linux

# ─────────────────────────────────────────────────────────────────────────────
  build-server:
    name: Server + keygen (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: server-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: server-cargo-

      - name: Build phantom-server + phantom-keygen
        run: cargo build --release -p phantom-server -p phantom-keygen

      - name: Upload phantom-server
        uses: actions/upload-artifact@v4
        with:
          name: phantom-server
          path: target/release/phantom-server

      - name: Upload phantom-keygen
        uses: actions/upload-artifact@v4
        with:
          name: phantom-keygen
          path: target/release/phantom-keygen

# ─────────────────────────────────────────────────────────────────────────────
  build-android:
    name: Android client (.apk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + Android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: android-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: android-cargo-

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Rust .so for arm64-v8a
        run: |
          # ANDROID_NDK_ROOT is a shell env var set by the runner, not a GH Actions context var
          export ANDROID_NDK_HOME="$ANDROID_NDK_ROOT"
          cargo ndk -t arm64-v8a --platform 26 \
            build --release -p phantom-client-android

          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          cp target/aarch64-linux-android/release/libphantom_android.so \
            android/app/src/main/jniLibs/arm64-v8a/

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Generate Gradle wrapper
        run: cd android && gradle wrapper --gradle-version 8.7

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhantomVPN-Android
          path: android/app/build/outputs/apk/debug/app-debug.apk

# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-linux, build-server, build-android]
    runs-on: ubuntu-latest
    # Only create release when triggered by a version tag
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PhantomVPN ${{ github.ref_name }}"
          body: |
            ## PhantomVPN ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | Linux client x86_64 | `phantom-client-linux` | CLI VPN client |
            | Server x86_64 | `phantom-server` | VPN server daemon |
            | Keygen x86_64 | `phantom-keygen` | Server/client key generator |
            | Android (arm64) | `app-debug.apk` | GhostStream VPN app |

            ### Android install
            ```
            adb install app-debug.apk
            ```

            ### Server deployment
            See `scripts/deploy.sh` or copy binaries to `/opt/phantom-vpn/` and install the
            `phantom-server.service` systemd unit from `scripts/`.

            ### Config
            See [config examples](config/) in the repository.
          files: |
            artifacts/phantom-client-linux/phantom-client-linux
            artifacts/phantom-server/phantom-server
            artifacts/phantom-keygen/phantom-keygen
            artifacts/PhantomVPN-Android/app-debug.apk
          draft: false
          prerelease: false
