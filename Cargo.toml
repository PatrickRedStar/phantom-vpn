[workspace]
members = [
    "crates/core",
    "crates/server",
    "crates/client-common",
    "crates/client-linux",
    "crates/client-android",
    "crates/relay",
]
resolver = "2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = "symbols"

[profile.release-debug]
inherits = "release"
debug = true
strip = "none"
