publish_to: 'none'
version: 0.13.0+25

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  shared_preferences: ^2.3.4
  google_fonts: ^6.2.1
  mobile_scanner: ^6.0.2
  qr_flutter: ^4.1.0
  http: ^1.2.2
  intl: ^0.19.0
  path_provider: ^2.1.5
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
