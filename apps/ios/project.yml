name: GhostStream
options:
  bundleIdPrefix: com.ghoststream.vpn
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  groupSortPosition: top
  generateEmptyDirectories: true

packages:
  PhantomKit:
    path: Packages/PhantomKit

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "UPG896A272"
    CODE_SIGN_STYLE: Automatic
    ENABLE_BITCODE: NO
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  GhostStream:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GhostStream
        excludes:
          - "**/.gitkeep"
    resources:
      - path: GhostStream/Assets.xcassets
      - path: GhostStream/Theme/Fonts
        optional: true
    info:
      path: GhostStream/Info.plist
      properties:
        CFBundleDisplayName: GhostStream
        LSRequiresIPhoneOS: true
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIViewControllerBasedStatusBarAppearance: true
        NSCameraUsageDescription: GhostStream uses the camera to scan QR codes containing VPN connection strings.
        UIAppFonts:
          - space_grotesk.ttf
          - space_grotesk_bold.ttf
          - departure_mono.otf
          - jetbrains_mono.ttf
          - jetbrains_mono_medium.ttf
          - instrument_serif.ttf
          - instrument_serif_italic.ttf
    entitlements:
      path: GhostStream/GhostStream.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ghoststream.vpn
        INFOPLIST_FILE: GhostStream/Info.plist
        CODE_SIGN_ENTITLEMENTS: GhostStream/GhostStream.entitlements
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(PROJECT_DIR)/Frameworks"
    dependencies:
      - target: PacketTunnelProvider
        embed: true
        codeSign: true
      - package: PhantomKit
        product: PhantomKit
      - package: PhantomKit
        product: PhantomUI
      - framework: Frameworks/PhantomCore.xcframework
        embed: true
        codeSign: true
        optional: true
      - sdk: NetworkExtension.framework
      - sdk: AVFoundation.framework

  PacketTunnelProvider:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PacketTunnelProvider
        excludes:
          - "**/.gitkeep"
    info:
      path: PacketTunnelProvider/Info.plist
      properties:
        CFBundlePackageType: XPC!
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider
    entitlements:
      path: PacketTunnelProvider/PacketTunnelProvider.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ghoststream.vpn.PacketTunnelProvider
        INFOPLIST_FILE: PacketTunnelProvider/Info.plist
        CODE_SIGN_ENTITLEMENTS: PacketTunnelProvider/PacketTunnelProvider.entitlements
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(PROJECT_DIR)/Frameworks"
    dependencies:
      - package: PhantomKit
        product: PhantomKit
      - package: PhantomKit
        product: PhantomUI
      - framework: Frameworks/PhantomCore.xcframework
        embed: false
        optional: true
      - sdk: NetworkExtension.framework
