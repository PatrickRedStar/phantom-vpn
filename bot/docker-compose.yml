services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["sh", "-c", "python -m app.db_migrate && exec python -m app.main"]
    env_file:
      - .env
    environment:
      BOT_HOST: "0.0.0.0"
      BOT_PORT: "8090"
      DATABASE_URL: "${DATABASE_URL:-sqlite+aiosqlite:////data/bot.db}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/data
      - ${XUI_CA_BUNDLE_HOST_PATH:-./deploy/certs}:/opt/xui-certs:ro
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8090/healthz', timeout=3).status == 200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      bot:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-8090}:80"
    volumes:
      - ./deploy/nginx/docker-compose.conf:/etc/nginx/conf.d/default.conf:ro
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
