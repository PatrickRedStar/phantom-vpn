services:
  phantom-telegram-bot:
    build: .
    image: phantom-telegram-bot:latest
    container_name: phantom-telegram-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/data
    # network_mode: host нужен чтобы дотянуться до 127.0.0.1:8081
    # (loopback bot-API phantom-server с Bearer-auth) + исходящий до api.telegram.org.
    network_mode: host
