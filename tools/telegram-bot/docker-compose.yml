services:
  phantom-telegram-bot:
    build: .
    image: phantom-telegram-bot:latest
    container_name: phantom-telegram-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/data
    # network_mode: host нужен чтобы дотянуться до 10.7.0.1:8080 (TUN
    # интерфейс phantom-server на том же хосте) + исходящий до api.telegram.org.
    network_mode: host
